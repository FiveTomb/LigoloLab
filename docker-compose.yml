# Both pivot1 and pivot2 are based off of the ubuntu:24.04
services:
  pivot1:
    build:
      context: .
      dockerfile: Dockerfile.pivot
    container_name: pivot1
    cap_add: ["NET_ADMIN"]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      dmz_net:
        ipv4_address: 172.18.0.20
      internal1_net:
        ipv4_address: 10.200.1.20

  pivot2:
    build:
      context: .
      dockerfile: Dockerfile.pivot
    container_name: pivot2
    cap_add: ["NET_ADMIN"]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      internal1_net:
        ipv4_address: 10.200.1.30
      internal2_net:
        ipv4_address: 10.200.2.20

  target:
    image: nginx:alpine
    container_name: target
    networks:
      internal2_net:
        ipv4_address: 10.200.2.30

networks:
  dmz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24

  internal1_net:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 10.200.1.0/24
          gateway: 10.200.1.1

  internal2_net:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 10.200.2.0/24
          gateway: 10.200.2.1

