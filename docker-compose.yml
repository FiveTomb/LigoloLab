services:
  pivot1:
    build:
      context: .
      dockerfile: Dockerfile.pivot
    image: pivot-ubuntu-tools:24.04
    container_name: pivot1
    cap_add: ["NET_ADMIN"]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - seed:/seed:ro
    networks:
      dmz_net:
        ipv4_address: 172.31.50.20
      internal1_net:
        ipv4_address: 10.200.1.20

  pivot2:
    build:
      context: .
      dockerfile: Dockerfile.pivot
    image: pivot-ubuntu-tools:24.04
    container_name: pivot2
    cap_add: ["NET_ADMIN"]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - seed:/seed:ro
    networks:
      internal1_net:
        ipv4_address: 10.200.1.30
      internal2_net:
        ipv4_address: 10.200.2.20

  target:
    image: nginx:alpine
    container_name: target
    networks:
      internal2_net:
        ipv4_address: 10.200.2.30

  sysadmin-seed:
    image: alpine:latest
    profiles: ["sysadmin"]
    command: sh -lc "mkdir -p /seed/sysadmin && cp -a /src/. /seed/sysadmin/"
    volumes:
      - ./profiles/sysadmin/seed:/src:ro
      - seed:/seed
    network_mode: "none"

  ctf-seed:
    image: alpine:latest
    profiles: ["ctf"]
    command: sh -lc "mkdir -p /seed/ctf && cp -a /src/. /seed/ctf/"
    volumes:
      - ./profiles/ctf/seed:/src:ro
      - seed:/seed
    network_mode: "none"

volumes:
  seed:

networks:
  dmz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.50.0/24

  internal1_net:
    driver: macvlan
    driver_opts:
      parent: eth0   # <-- change if your Kali VM interface isn't eth0 (check: ip -br addr)
    ipam:
      config:
        - subnet: 10.200.1.0/24
          gateway: 10.200.1.1

  internal2_net:
    driver: macvlan
    driver_opts:
      parent: eth0   # <-- same parent as internal1_net
    ipam:
      config:
        - subnet: 10.200.2.0/24
          gateway: 10.200.2.1
